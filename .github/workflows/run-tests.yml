name: run-tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    # PHP 8.3, not 8.2: the test harness needs pest-plugin-livewire v4
    # (PHP ^8.3), which is what pulls in Livewire 4 — the stack local
    # development runs and PR-5 commits to. On 8.2 the resolver falls back
    # to Livewire 3 and the suite hits the LW-01..04 version mismatches.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        php: [8.3]
        stability: [prefer-stable]

    name: P${{ matrix.php }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:11.*" "orchestra/testbench:^9.0" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      # --no-coverage: phpunit.xml.dist configures coverage reports, and
      # pest aborts (exit 1, zero tests) when they're requested without a
      # coverage driver. setup-php installs none (coverage: none).
      - name: Execute tests
        run: vendor/bin/pest --no-coverage

  # Mirrors how developers actually run the suite (`composer test`).
  # A serial-only CI run hides parallel-specific failures such as shared
  # filesystem state between ParaTest workers (PROC-01/PROC-03).
  test-parallel:
    runs-on: ubuntu-latest

    name: parallel - P8.3 - prefer-stable

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:11.*" "orchestra/testbench:^9.0" --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction

      - name: Execute tests (parallel)
        run: composer test

  # Proves composer.json is satisfiable from scratch on every supported
  # PHP × Laravel combination. Would have caught PROC-02 (composer.json
  # unsatisfiable on main for months, fixed in f0945cfb). No composer
  # cache on purpose — a fresh resolve is the whole point.
  fresh-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
        laravel: ['11.*', '12.*']
        include:
          - laravel: '11.*'
            testbench: '9.*'
          - laravel: '12.*'
            testbench: '10.*'

    name: fresh-install - P${{ matrix.php }} - L${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Fresh install
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction

      - name: Show resolved versions
        run: composer show --direct | grep -E "laravel/framework|orchestra/testbench|livewire/livewire"
