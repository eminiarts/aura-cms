name: tests

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
      - 'release/**'

jobs:
  test:
    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']
        laravel: ['12', '13']
        include:
          - laravel: '12'
            testbench: '^10.0'
          - laravel: '13'
            testbench: '^11.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo_sqlite, bcmath, intl, gd, exif, iconv, fileinfo
          coverage: none

      - name: Select Laravel version
        run: composer require "laravel/framework:^${{ matrix.laravel }}.0" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests in parallel
        run: php -d memory_limit=1G vendor/bin/pest --no-coverage --parallel --exclude-testsuite Browser

  teams-off:
    name: Teams-off
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo_sqlite, bcmath, intl, gd, exif, iconv, fileinfo
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Run teams-off suite
        run: php -d memory_limit=1G vendor/bin/pest --no-coverage -c phpunit-without-teams.xml

  browser:
    name: Browser tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo_sqlite, bcmath, intl, gd, exif, iconv, fileinfo
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Run browser tests
        run: php -d memory_limit=1G vendor/bin/pest --testsuite Browser --no-coverage

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-screenshots
          path: tests/Browser/Screenshots/
          if-no-files-found: ignore

  fresh-install:
    name: Fresh Laravel install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pdo_sqlite, intl, gd, fileinfo
          coverage: none

      - name: Create Laravel application
        run: composer create-project laravel/laravel:^13.0 "$RUNNER_TEMP/aura-app" --no-interaction --prefer-dist

      - name: Install Aura from checkout
        working-directory: ${{ runner.temp }}/aura-app
        run: |
          composer config repositories.aura path "$GITHUB_WORKSPACE"
          composer require eminiarts/aura-cms:@dev --with-all-dependencies --no-interaction
          php artisan aura:install --no-interaction \
            --teams=true \
            --registration=false \
            --admin-name="CI Admin" \
            --admin-email="ci@example.com" \
            --admin-password="CI-Test-Password-2026!" | tee aura-install.log

      - name: Verify installed application
        working-directory: ${{ runner.temp }}/aura-app
        run: |
          if php artisan migrate:status --pending --no-ansi | grep -q Pending; then
            echo "Aura installation left pending migrations."
            exit 1
          fi

          php artisan route:list --name=aura --json | php -r '$routes = json_decode(stream_get_contents(STDIN), true, flags: JSON_THROW_ON_ERROR); exit(count($routes) > 0 ? 0 : 1);'
          test -n "$(find public/vendor/aura/assets -type f -print -quit)"
          ! grep -q "Publishing service provider" aura-install.log
          test ! -f app/Providers/AuraServiceProvider.php
          php artisan tinker --execute='exit(App\Models\User::query()->where("email", "ci@example.com")->where("global_admin", true)->exists() ? 0 : 1);'
          vendor/bin/pint --test app/Models/User.php
          php artisan test --compact
