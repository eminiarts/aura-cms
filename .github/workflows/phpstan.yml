name: PHPStan

on:
  workflow_dispatch:
  push:
    paths:
      - '**.php'
      - 'phpstan.neon.dist'
      - 'phpstan-baseline.neon'
      - '.github/workflows/phpstan.yml'
  pull_request:
    branches: [main, develop]

jobs:
  phpstan:
    name: phpstan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # PHP 8.3 so the resolver picks Livewire 4 (via pest-plugin-livewire v4),
      # matching local development and the committed baseline. On 8.2 it
      # resolves Livewire 3 and analysis fails on Livewire-4-only APIs.
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@v3

      # The committed phpstan-baseline.neon absorbs pre-existing errors,
      # so a non-zero exit here means NEW errors were introduced (PROC-05).
      - name: Run PHPStan
        run: ./vendor/bin/phpstan --error-format=github
